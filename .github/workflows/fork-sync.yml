name: Sync upstream Vencord

on:
    schedule:
        # Daily at 06:00 UTC
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write
    issues: write

jobs:
    sync:
        if: github.repository != 'Vendicated/Vencord'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Rebase onto upstream with conflict resolution
              id: sync
              run: node scripts/fork/syncUpstream.mjs --push

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Verify build after sync
              if: steps.sync.outcome == 'success'
              run: |
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: Open issue on sync failure
              if: failure() && steps.sync.outcome == 'failure'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  gh issue create \
                      --title "Upstream sync failed ($(date -u +%Y-%m-%d))" \
                      --body "$(cat <<EOF
                  The scheduled upstream sync could not complete automatically.

                  **Workflow run:** ${RUN_URL}

                  ### What to do
                  1. \`git fetch upstream && node scripts/fork/syncUpstream.mjs\`
                  2. Resolve any remaining conflicts manually
                  3. \`git push origin main\`

                  Fork-owned paths are listed in \`.github/fork-paths.txt\`.
                  EOF
                  )" \
                      --label "upstream-sync" || true
